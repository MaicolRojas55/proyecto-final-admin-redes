version: "3"

services:

  db:
    image: postgres:15
    restart: always

    environment:
      POSTGRES_DB: wiki
      POSTGRES_USER: wiki
      POSTGRES_PASSWORD: wiki123

  wiki:
    image: requarks/wiki:latest

    restart: always

    depends_on:
      - db

    ports:
      - "3000:3000"

    environment:
      DB_TYPE: postgres

      DB_HOST: db

      DB_PORT: 5432

      DB_USER: wiki

      DB_PASS: wiki123

      DB_NAME: wiki
